version: "3.8"
services:
    db:
      image: mysql:8.0
      restart: unless-stopped
      command: --default-authentication-plugin=mysql_native_password
      environment:
        MYSQL_DATABASE: ${MYSQL_DATABASE}
        # MYSQL_USER: ${MYSQL_USER}
        MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      volumes:
        - ./dump:/docker-entrypoint-initdb.d:ro
        - ./conf:/etc/mysql/conf.d:ro
        - persistent:/var/lib/mysql
      networks:
        - backend
      healthcheck:
        test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 20
        start_period: 60s

    phpmyadmin:
      image: phpmyadmin/phpmyadmin:latest
      restart: unless-stopped
      environment:
        PMA_HOST: ${PMA_HOST}
        PMA_USER: ${PMA_USER}
        PMA_PASSWORD: ${PMA_PASSWORD}
        PMA_PORT: 3306
        PMA_ARBITRARY: 0
        UPLOAD_LIMIT: ${PHP_UPLOAD_MAX_FILESIZE}
      ports:
        - "${PHPMYADMIN_PORT}:80"
      depends_on:
        db:
          condition: service_healthy
      networks:
        - frontend
        - backend

    www-node-express:
      build: .
      restart: unless-stopped
      ports:
        - "${EXPRESS_PORT}:3000"
      networks:
        - backend
      depends_on:
        db:
          condition: service_healthy
      environment:
        - NODE_ENV=production
        - PORT=3000
        # 1. DB_HOST: Forzamos que sea 'db' (el nombre del servicio en docker)
        - DB_HOST=db
        
        # 2. DB_USER: Mapeamos tu variable del .env
        - DB_USER=root
        
        # 3. DB_PASSWORD: Para root, usar la misma clave de MYSQL_ROOT_PASSWORD
        - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
        
        # 4. DB_NAME: Mapeamos el nombre
        - DB_NAME=${MYSQL_DATABASE}
        
        # 5. DB_PORT
        - DB_PORT=3306
        - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      healthcheck:
        test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
        interval: 10s
        timeout: 5s
        retries: 5

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  persistent: